# This is config file with placeholders which can be directly used replacing with actual values
# or a local config file like application-local.properties can be cloned from this to use for local development
#spring.profiles.active=local

# Server Configuration
server.port=8080

# Application Name
spring.application.name=app

# Database Configuration (Supabase PostgreSQL)
# Replace these with your actual Supabase credentials

# Session pooler connection
spring.datasource.url=jdbc:postgresql://<YOUR-SUPABASE-HOST>:5432/postgres
spring.datasource.username=<YOUR-USERNAME>
spring.datasource.password=<YOUR-DATABASE-PASSWORD>
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# Logging Configuration
logging.level.root=INFO
logging.level.backend=INFO
logging.level.backend.controller.AuthController=INFO
logging.level.backend.service.UserService=INFO
logging.level.backend.filter.RequestTracingFilter=INFO
logging.level.org.springframework.web=INFO
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# Logging pattern (overridden by logback-spring.xml if present)
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] [%X{correlationId}] %-5level %logger{36} - %msg%n

# JWT Configuration
jwt.secret=<YOUR-JWT-SECRET-KEY-MINIMUM-256-BITS>
jwt.expiration=3600000  # 1 hour in milliseconds

# Password & API Key Hashing
passwordHandler.salt_rounds=12
apiKeyHandler.salt_rounds=12
