# This is config file with placeholders which can be directly used replacing with actual values
# or a local config file like application-local.properties can be cloned from this to use for local development

# Server Configuration
server.port=8080

# Application Name
spring.application.name=app

# Database Configuration (Supabase PostgreSQL)
# Replace these with your actual Supabase credentials

# Session pooler connection
spring.datasource.url=jdbc:postgresql://<YOUR-SUPABASE-HOST>:5432/postgres
spring.datasource.username=<YOUR-USERNAME>
spring.datasource.password=<YOUR-DATABASE-PASSWORD>
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# Logging Configuration
logging.level.root=INFO
logging.level.backend=DEBUG
logging.level.org.hibernate.SQL=DEBUG
